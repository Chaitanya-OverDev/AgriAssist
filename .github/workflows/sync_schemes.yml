name: Sync Government Schemes

on:
  schedule:
    # Runs at 00:00 every 5th day of the month
    - cron: '0 0 */5 * *'
  # This line allows you to click a button in GitHub to run it manually anytime!
  workflow_dispatch: 

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        env:
          # GitHub will inject these secrets securely when it runs
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MYSCHEME_API_KEY: ${{ secrets.MYSCHEME_API_KEY }}
        run: |
          python api/sync_schemes.py